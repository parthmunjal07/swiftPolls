services:
  redis:
    image: redis:latest
    container_name: redis-dev
    ports:
      - "6379:6379"
    restart: always

  postgres:
    image: postgres:latest
    container_name: postgres-dev
    environment:
      POSTGRES_USER: polls
      POSTGRES_PASSWORD: polls
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    restart: always